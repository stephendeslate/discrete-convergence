version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleet_dispatch_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/fleet_dispatch_test
      JWT_SECRET: test-secret
      NODE_ENV: test
    depends_on:
      postgres-test:
        condition: service_healthy
    command: ['sh', '-c', 'npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && node apps/api/dist/main.js']
