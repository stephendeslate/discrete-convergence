version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_management
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/event_management?connection_limit=10
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
      APP_VERSION: 1.0.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: event_management_pgdata
