services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics_secret
      POSTGRES_DB: analytics_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://analytics:analytics_secret@postgres:5432/analytics_engine?connection_limit=10
      JWT_SECRET: dev-jwt-secret-change-in-prod
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-prod
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
      PORT: "3001"
      API_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
