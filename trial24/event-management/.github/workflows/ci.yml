name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: event_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/event_management_test?schema=public"
      JWT_SECRET: "ci-jwt-secret-at-least-32-characters-long"
      JWT_REFRESH_SECRET: "ci-refresh-secret-at-least-32-chars-long"
      BCRYPT_SALT_ROUNDS: "4"
      PORT: "3001"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @em/api exec prisma migrate deploy
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
