# GitHub Actions CI pipeline
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analytics_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/analytics_engine_test
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema=apps/api/prisma/schema.prisma
      - run: pnpm exec prisma migrate deploy --schema=apps/api/prisma/schema.prisma
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
