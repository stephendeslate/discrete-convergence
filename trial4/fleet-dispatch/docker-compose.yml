version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_secret
      POSTGRES_DB: fleet_dispatch
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleet -d fleet_dispatch']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://fleet:fleet_secret@postgres:5432/fleet_dispatch?connection_limit=10
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
