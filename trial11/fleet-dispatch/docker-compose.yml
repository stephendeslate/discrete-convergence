version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet_dispatch
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleet -d fleet_dispatch']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://fleet:fleet_password@db:5432/fleet_dispatch?connection_limit=10
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3001
      PORT: '3000'
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: ['node', 'apps/web/.next/standalone/server.js']
    environment:
      API_URL: http://api:3000
      PORT: '3001'
    ports:
      - '3001:3001'
    depends_on:
      - api

volumes:
  pgdata:
