services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/analytics_engine?connection_limit=10"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGIN: "http://localhost:3000"
      NODE_ENV: production
    ports:
      - "3001:3001"

volumes:
  postgres_data:
