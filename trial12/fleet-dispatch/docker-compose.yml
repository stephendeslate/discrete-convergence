services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet_dispatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fleet:fleet_password@db:5432/fleet_dispatch?connection_limit=10
      JWT_SECRET: fleet-dispatch-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
