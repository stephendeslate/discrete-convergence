services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet_test
      POSTGRES_PASSWORD: fleet_test_password
      POSTGRES_DB: fleet_dispatch_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleet_test']
      interval: 5s
      timeout: 3s
      retries: 5
