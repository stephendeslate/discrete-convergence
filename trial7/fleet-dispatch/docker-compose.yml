services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet_dispatch
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleet']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
