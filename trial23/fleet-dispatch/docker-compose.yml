version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleet_dispatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fleet_dispatch
      JWT_SECRET: fleet-dispatch-jwt-secret-dev
      PORT: '4000'
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
