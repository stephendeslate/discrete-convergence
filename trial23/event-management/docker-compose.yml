version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventmgr
      POSTGRES_PASSWORD: eventmgr_pass
      POSTGRES_DB: eventmgr
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventmgr']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '${PORT:-3001}:3001'
    environment:
      DATABASE_URL: postgresql://eventmgr:eventmgr_pass@postgres:5432/eventmgr
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: '3001'
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
