services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_pass
      POSTGRES_DB: fleet_dispatch
    ports:
      - '5432:5432'
    volumes:
      - fleet_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleet']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://fleet:fleet_pass@postgres:5432/fleet_dispatch?connection_limit=10
      JWT_SECRET: fleet-dispatch-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
      PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  fleet_data:
