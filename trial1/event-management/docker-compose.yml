services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: event_mgmt
      POSTGRES_PASSWORD: event_mgmt_secret
      POSTGRES_DB: event_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://event_mgmt:event_mgmt_secret@db:5432/event_management?connection_limit=10
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
