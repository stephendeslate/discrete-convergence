services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics_test
      POSTGRES_PASSWORD: analytics_test_secret
      POSTGRES_DB: analytics_engine_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    environment:
      DATABASE_URL: postgresql://analytics_test:analytics_test_secret@postgres:5432/analytics_engine_test?connection_limit=5
      JWT_SECRET: test-jwt-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm turbo run test
