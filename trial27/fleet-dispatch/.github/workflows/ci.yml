# CI pipeline: install, lint, typecheck, test, build, docker
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fleet_dispatch_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fleet_dispatch_test?schema=public
      JWT_SECRET: test-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fleet-dispatch/api exec prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run migrations
        run: pnpm --filter @fleet-dispatch/api exec prisma migrate deploy

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Docker build
        run: docker build -t fleet-dispatch-api .
